<h2>My Appointments</h2>

<table border="1">
    <tr>
        <th>Doctor</th>
        <th>Date</th>
        <th>Time</th>
    </tr>

    {% for appointment in appointments %}
    <tr>
        <td>{{ appointment.doctor.user.username }}</td>
        <td>{{ appointment.appointment_data }}</td>
        <td>{{ appointment.appointment_time }}</td>
    </tr>
    {% endfor %}
</table>
